steps:
  # Step 1: Run linter
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'lint']
    id: 'Lint'

  # Step 2: Run tests
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['test']
    id: 'Test'

  # Step 3: Build & Deploy Container to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'election-education-bot'
      - '--source'
      - '.'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest'
    id: 'Deploy'

options:
  logging: CLOUD_LOGGING_ONLY
