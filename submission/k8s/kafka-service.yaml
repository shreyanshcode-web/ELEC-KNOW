apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: election-education
  labels:
    app: kafka
    app.kubernetes.io/name: election-education
    app.kubernetes.io/component: messaging
spec:
  type: ClusterIP
  selector:
    app: kafka
  ports:
    - name: kafka
      protocol: TCP
      port: 9092
      targetPort: 9092
